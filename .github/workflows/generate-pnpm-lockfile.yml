name: Generate pnpm lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-lockfile:
    name: Generate and commit pnpm-lock.yaml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate lockfile only
        run: pnpm install --lockfile-only --frozen-lockfile=false

      - name: Remove this temporary workflow
        run: rm .github/workflows/generate-pnpm-lockfile.yml

      - name: Commit lockfile and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml .github/workflows/generate-pnpm-lockfile.yml .gitignore
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: add pnpm lockfile"
          git push
