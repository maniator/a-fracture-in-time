name: "Copilot Setup Steps"

# Runs automatically when this file changes (for easy validation).
# Can also be triggered manually from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # This job name MUST be `copilot-setup-steps` for GitHub Copilot to pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Match the Node version used in ci.yml
      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Install all workspace dependencies (narrative-engine, shared-types, web)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the Playwright Chromium binary so it is only re-downloaded when
      # the lockfile (and therefore the Playwright version) changes.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      # Cache miss: download Chromium and install all OS-level browser dependencies.
      - name: Install Playwright Chromium browser (with OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter web exec playwright install chromium --with-deps

      # Cache hit: browser binary is restored; only reinstall OS-level deps
      # (fast, no network download of the browser binary).
      - name: Install Playwright OS dependencies (browser cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter web exec playwright install-deps chromium
