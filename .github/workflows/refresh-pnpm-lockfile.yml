name: Refresh pnpm lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-lockfile:
    name: Refresh and commit pnpm-lock.yaml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh lockfile only
        run: pnpm install --lockfile-only --frozen-lockfile=false

      - name: Commit lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git status --short
          if git diff --cached --quiet; then
            echo "No lockfile changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh pnpm lockfile"
          git push origin main
